<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forge Intent — Admin Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #1c1917 0%, #292524 100%);
      min-height: 100vh;
      color: #fafaf9;
      padding: 40px 20px;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #a8a29e; margin-bottom: 40px; }

    .card {
      background: #292524;
      border: 1px solid #44403c;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .card h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #fafaf9; }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #a8a29e; margin-bottom: 6px; }
    input, textarea, select {
      width: 100%;
      padding: 12px 14px;
      background: #1c1917;
      border: 1px solid #44403c;
      border-radius: 8px;
      color: #fafaf9;
      font-size: 14px;
      font-family: inherit;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
    }
    textarea { resize: vertical; min-height: 80px; }

    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover:not(:disabled) { transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #22c55e; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #16a34a; }
    .btn-secondary { background: #44403c; color: #fafaf9; }
    .btn-secondary:hover:not(:disabled) { background: #57534e; }
    .btn-blue { background: #3b82f6; color: #fff; }
    .btn-blue:hover:not(:disabled) { background: #2563eb; }
    .btn-purple { background: #8b5cf6; color: #fff; }
    .btn-purple:hover:not(:disabled) { background: #7c3aed; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-icon { padding: 6px 8px; min-width: 32px; justify-content: center; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-danger:hover:not(:disabled) { background: #b91c1c; }

    .link-output {
      background: #1c1917;
      border: 1px solid #44403c;
      border-radius: 8px;
      padding: 16px;
      margin-top: 20px;
      display: none;
    }
    .link-output.active { display: block; }
    .link-output label { margin-bottom: 8px; }
    .link-box {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .link-box input {
      flex: 1;
      background: #292524;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
    }

    .action-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .recipient-input {
      display: none;
      margin-top: 12px;
      padding: 12px;
      background: #252525;
      border-radius: 8px;
    }
    .recipient-input.active { display: block; }
    .recipient-input label { color: #a8a29e; font-size: 12px; margin-bottom: 6px; }
    .recipient-input input { margin-bottom: 8px; }

    .row { display: flex; gap: 16px; }
    .row .form-group { flex: 1; }

    /* Progress Tracking Table */
    .tracking-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .tracking-stats {
      display: flex;
      gap: 16px;
    }
    .stat {
      text-align: center;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #22c55e;
    }
    .stat-label {
      font-size: 11px;
      color: #78716c;
      text-transform: uppercase;
    }

    .tracking-table {
      width: 100%;
      border-collapse: collapse;
    }
    .tracking-table th {
      text-align: left;
      padding: 12px 8px;
      font-size: 11px;
      font-weight: 600;
      color: #78716c;
      text-transform: uppercase;
      border-bottom: 1px solid #44403c;
    }
    .tracking-table td {
      padding: 14px 8px;
      font-size: 14px;
      border-bottom: 1px solid #3a3a3a;
      vertical-align: middle;
    }
    .tracking-table tr:hover td {
      background: #1c1917;
    }

    /* Progress Icons */
    .progress-cell {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .progress-step {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.2s;
    }
    .progress-step.pending {
      background: #3a3a3a;
      color: #78716c;
    }
    .progress-step.active {
      background: #3b82f620;
      color: #3b82f6;
      animation: pulse 2s infinite;
    }
    .progress-step.complete {
      background: #22c55e20;
      color: #22c55e;
    }
    .progress-connector {
      width: 12px;
      height: 2px;
      background: #3a3a3a;
    }
    .progress-connector.complete {
      background: #22c55e;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Respondent info */
    .respondent-name {
      font-weight: 600;
      color: #fafaf9;
    }
    .respondent-email {
      font-size: 12px;
      color: #78716c;
      margin-top: 2px;
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-badge.sent { background: #3b82f620; color: #3b82f6; }
    .status-badge.opened { background: #eab30820; color: #eab308; }
    .status-badge.in-progress { background: #8b5cf620; color: #8b5cf6; }
    .status-badge.completed { background: #22c55e20; color: #22c55e; }

    /* Action buttons */
    .action-buttons {
      display: flex;
      gap: 4px;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: #78716c;
    }
    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #22c55e;
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.2s ease;
      z-index: 1000;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* Icons */
    .icon {
      width: 16px;
      height: 16px;
      display: inline-block;
    }

    @media (max-width: 768px) {
      .row { flex-direction: column; gap: 0; }
      .tracking-table { font-size: 13px; }
      .tracking-table th, .tracking-table td { padding: 10px 6px; }
      .progress-step { width: 24px; height: 24px; font-size: 12px; }
      .progress-connector { width: 8px; }
      .tracking-stats { gap: 12px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Forge Intent Admin</h1>
    <p class="subtitle">Generate and distribute interview links — 2 clicks to send</p>

    <div class="card">
      <h2>Create Interview Link</h2>

      <div class="row">
        <div class="form-group">
          <label for="company">Company / Client Name</label>
          <input type="text" id="company" placeholder="e.g., Group Tab" />
        </div>
        <div class="form-group">
          <label for="project">Project Name (Internal)</label>
          <input type="text" id="project" placeholder="e.g., Group Tab Beta" />
        </div>
      </div>

      <div class="form-group">
        <label for="domain">Domain Activity (What respondents do)</label>
        <textarea id="domain" placeholder="e.g., organized a group trip or event — coordinating with multiple people, managing logistics, handling payments"></textarea>
      </div>

      <div class="row">
        <div class="form-group">
          <label for="respondent">Respondent Name</label>
          <input type="text" id="respondent" placeholder="e.g., Maria Johnson" />
        </div>
        <div class="form-group">
          <label for="email">Respondent Email</label>
          <input type="email" id="email" placeholder="e.g., maria@example.com" />
        </div>
      </div>

      <div class="form-group">
        <label for="phase">Phase</label>
        <select id="phase">
          <option value="Phase 1">Phase 1 - Discovery</option>
          <option value="Phase 2">Phase 2 - Validation</option>
        </select>
      </div>

      <button class="btn btn-primary" onclick="generateAndSaveLink()">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        Generate Link
      </button>
      <button class="btn btn-secondary" onclick="clearForm()" style="margin-left: 8px;">Clear</button>

      <div class="link-output" id="linkOutput">
        <label>Interview Link for <strong id="linkCompany"></strong></label>
        <div class="link-box">
          <input type="text" id="generatedLink" readonly />
          <button class="btn btn-secondary btn-icon" onclick="copyLink()" title="Copy URL">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
        </div>

        <div class="action-grid">
          <button class="btn btn-purple btn-sm" onclick="copyAsMessage()">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            Copy as Message
          </button>
          <button class="btn btn-blue btn-sm" onclick="sendMailto()">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            Send Email
          </button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="tracking-header">
        <h2 style="margin-bottom: 0;">Link Progress Tracking</h2>
        <div class="tracking-stats" id="trackingStats">
          <div class="stat">
            <div class="stat-value" id="statTotal">0</div>
            <div class="stat-label">Total</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="statCompleted" style="color: #22c55e;">0</div>
            <div class="stat-label">Completed</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="statPending" style="color: #eab308;">0</div>
            <div class="stat-label">Pending</div>
          </div>
        </div>
      </div>

      <div id="trackingContent">
        <div class="empty-state">
          <div class="empty-state-icon">📊</div>
          <p>No links created yet.</p>
          <p style="font-size: 13px; margin-top: 8px;">Generate your first interview link above to start tracking.</p>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Copied to clipboard!</div>

  <script>
    const BASE_URL = 'https://arcfoundry-ai.github.io/forge-intent-portal/';
    const PORTAL_FILE = 'trackc.html'; // Firebase tracked version only

    // ═══════════════════════════════════════════════════════════════
    // STATUS DEFINITIONS
    // ═══════════════════════════════════════════════════════════════

    const STATUSES = {
      SENT: { key: 'sent', label: 'Sent', icon: '📤' },
      OPENED: { key: 'opened', label: 'Opened', icon: '👁' },
      IN_PROGRESS: { key: 'in-progress', label: 'In Progress', icon: '✏️' },
      COMPLETED: { key: 'completed', label: 'Completed', icon: '✅' }
    };

    // ═══════════════════════════════════════════════════════════════
    // FORM HANDLING
    // ═══════════════════════════════════════════════════════════════

    function clearForm() {
      document.getElementById('company').value = '';
      document.getElementById('project').value = '';
      document.getElementById('domain').value = '';
      document.getElementById('respondent').value = '';
      document.getElementById('email').value = '';
      document.getElementById('phase').selectedIndex = 0;
      document.getElementById('linkOutput').classList.remove('active');
      document.getElementById('generatedLink').value = '';
    }

    function generateAndSaveLink() {
      const company = document.getElementById('company').value.trim();
      const project = document.getElementById('project').value.trim() || company;
      const domain = document.getElementById('domain').value.trim();
      const respondent = document.getElementById('respondent').value.trim();
      const email = document.getElementById('email').value.trim();
      const phase = document.getElementById('phase').value;

      if (!company || !domain) {
        alert('Please fill in at least Company and Domain Activity');
        return;
      }

      // Generate unique token
      const token = generateToken(16);

      const params = new URLSearchParams({
        project: project,
        domain: domain,
        respondent: respondent,
        phase: phase,
        t: token
      });

      const link = `${BASE_URL}${PORTAL_FILE}?${params.toString()}`;

      // Save to tracking list
      const saved = JSON.parse(localStorage.getItem('forgeLinks') || '[]');
      saved.unshift({
        id: Date.now(),
        token,
        company,
        project,
        domain,
        respondent: respondent || 'Anonymous',
        email: email || '',
        phase,
        link,
        status: 'sent',
        created: new Date().toISOString(),
        sentAt: new Date().toISOString(),
        openedAt: null,
        inProgressAt: null,
        completedAt: null
      });
      localStorage.setItem('forgeLinks', JSON.stringify(saved));

      // Show link output
      document.getElementById('generatedLink').value = link;
      document.getElementById('linkCompany').textContent = respondent || company;
      document.getElementById('linkOutput').classList.add('active');

      renderTrackingTable();
      showToast('Link generated and saved!');
    }

    function generateToken(length = 16) {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
      let token = '';
      for (let i = 0; i < length; i++) {
        token += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return token;
    }

    // ═══════════════════════════════════════════════════════════════
    // COPY & EMAIL FUNCTIONS
    // ═══════════════════════════════════════════════════════════════

    function copyLink() {
      const link = document.getElementById('generatedLink').value;
      navigator.clipboard.writeText(link).then(() => {
        showToast('URL copied!');
      });
    }

    function copyAsMessage(linkData = null) {
      const data = linkData || {
        company: document.getElementById('company').value.trim(),
        project: document.getElementById('project').value.trim(),
        domain: document.getElementById('domain').value.trim(),
        respondent: document.getElementById('respondent').value.trim(),
        link: document.getElementById('generatedLink').value
      };

      const message = generateMessage(data);
      navigator.clipboard.writeText(message).then(() => {
        showToast('Message copied!');
      });
    }

    function generateMessage(data) {
      const greeting = data.respondent ? `Hi ${data.respondent.split(' ')[0]},` : 'Hi,';
      return `${greeting}

You've been invited to share your experience with ${data.project || data.company}.

We're interested in hearing about times when you've ${data.domain}.

This brief interview typically takes 10-15 minutes and will help us build better solutions.

Click here to begin: ${data.link}

Thanks for your time!`;
    }

    function sendMailto(linkData = null) {
      const data = linkData || {
        company: document.getElementById('company').value.trim(),
        project: document.getElementById('project').value.trim(),
        domain: document.getElementById('domain').value.trim(),
        respondent: document.getElementById('respondent').value.trim(),
        email: document.getElementById('email').value.trim(),
        link: document.getElementById('generatedLink').value
      };

      const subject = encodeURIComponent(`You're invited to share your experience — ${data.project || data.company}`);
      const body = encodeURIComponent(generateMessage(data));

      window.location.href = `mailto:${data.email}?subject=${subject}&body=${body}`;
      showToast('Opening email client...');
    }

    // ═══════════════════════════════════════════════════════════════
    // TRACKING TABLE
    // ═══════════════════════════════════════════════════════════════

    function renderTrackingTable() {
      const saved = JSON.parse(localStorage.getItem('forgeLinks') || '[]');
      const container = document.getElementById('trackingContent');

      // Update stats
      const total = saved.length;
      const completed = saved.filter(l => l.status === 'completed').length;
      const pending = total - completed;

      document.getElementById('statTotal').textContent = total;
      document.getElementById('statCompleted').textContent = completed;
      document.getElementById('statPending').textContent = pending;

      if (saved.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📊</div>
            <p>No links created yet.</p>
            <p style="font-size: 13px; margin-top: 8px;">Generate your first interview link above to start tracking.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = `
        <table class="tracking-table">
          <thead>
            <tr>
              <th>Respondent</th>
              <th>Project</th>
              <th style="text-align: center;">Progress</th>
              <th>Status</th>
              <th style="text-align: right;">Actions</th>
            </tr>
          </thead>
          <tbody>
            ${saved.map(l => renderTrackingRow(l)).join('')}
          </tbody>
        </table>
      `;
    }

    function renderTrackingRow(link) {
      const statusIndex = getStatusIndex(link.status);

      return `
        <tr>
          <td>
            <div class="respondent-name">${escapeHtml(link.respondent)}</div>
            <div class="respondent-email">${escapeHtml(link.email) || '—'}</div>
          </td>
          <td>${escapeHtml(link.project || link.company)}</td>
          <td>
            <div class="progress-cell">
              ${renderProgressStep(0, statusIndex, '📤', 'Sent')}
              ${renderConnector(0, statusIndex)}
              ${renderProgressStep(1, statusIndex, '👁', 'Opened')}
              ${renderConnector(1, statusIndex)}
              ${renderProgressStep(2, statusIndex, '✏️', 'In Progress')}
              ${renderConnector(2, statusIndex)}
              ${renderProgressStep(3, statusIndex, '✅', 'Completed')}
            </div>
          </td>
          <td>
            <span class="status-badge ${link.status}">${getStatusLabel(link.status)}</span>
          </td>
          <td>
            <div class="action-buttons" style="justify-content: flex-end;">
              <button class="btn btn-secondary btn-icon" onclick="copyLinkById(${link.id})" title="Copy URL">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="9" y="9" width="13" height="13" rx="2"/>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
              </button>
              <button class="btn btn-purple btn-icon" onclick="copyMessageById(${link.id})" title="Copy Message">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
              </button>
              <button class="btn btn-blue btn-icon" onclick="emailById(${link.id})" title="Send Email">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                  <polyline points="22,6 12,13 2,6"/>
                </svg>
              </button>
              <button class="btn btn-secondary btn-icon" onclick="updateStatusById(${link.id})" title="Update Status">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="9 11 12 14 22 4"/>
                  <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                </svg>
              </button>
              <button class="btn btn-danger btn-icon" onclick="deleteById(${link.id})" title="Delete">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
              </button>
            </div>
          </td>
        </tr>
      `;
    }

    function renderProgressStep(stepIndex, currentStatusIndex, icon, title) {
      let stateClass = 'pending';
      if (stepIndex < currentStatusIndex) stateClass = 'complete';
      else if (stepIndex === currentStatusIndex) stateClass = currentStatusIndex === 3 ? 'complete' : 'active';

      return `<div class="progress-step ${stateClass}" title="${title}">${icon}</div>`;
    }

    function renderConnector(afterStepIndex, currentStatusIndex) {
      const isComplete = afterStepIndex < currentStatusIndex;
      return `<div class="progress-connector ${isComplete ? 'complete' : ''}"></div>`;
    }

    function getStatusIndex(status) {
      const map = { 'sent': 0, 'opened': 1, 'in-progress': 2, 'completed': 3 };
      return map[status] || 0;
    }

    function getStatusLabel(status) {
      const map = {
        'sent': 'Sent',
        'opened': 'Opened',
        'in-progress': 'In Progress',
        'completed': 'Completed'
      };
      return map[status] || 'Sent';
    }

    // ═══════════════════════════════════════════════════════════════
    // ROW ACTIONS
    // ═══════════════════════════════════════════════════════════════

    function getLinkById(id) {
      const saved = JSON.parse(localStorage.getItem('forgeLinks') || '[]');
      return saved.find(l => l.id === id);
    }

    function copyLinkById(id) {
      const link = getLinkById(id);
      if (link) {
        navigator.clipboard.writeText(link.link).then(() => {
          showToast('URL copied!');
        });
      }
    }

    function copyMessageById(id) {
      const link = getLinkById(id);
      if (link) {
        copyAsMessage(link);
      }
    }

    function emailById(id) {
      const link = getLinkById(id);
      if (link) {
        sendMailto(link);
      }
    }

    function updateStatusById(id) {
      const saved = JSON.parse(localStorage.getItem('forgeLinks') || '[]');
      const linkIndex = saved.findIndex(l => l.id === id);
      if (linkIndex === -1) return;

      const link = saved[linkIndex];
      const statusOrder = ['sent', 'opened', 'in-progress', 'completed'];
      const currentIndex = statusOrder.indexOf(link.status);
      const nextIndex = (currentIndex + 1) % statusOrder.length;

      link.status = statusOrder[nextIndex];

      // Set timestamps
      if (link.status === 'opened' && !link.openedAt) link.openedAt = new Date().toISOString();
      if (link.status === 'in-progress' && !link.inProgressAt) link.inProgressAt = new Date().toISOString();
      if (link.status === 'completed' && !link.completedAt) link.completedAt = new Date().toISOString();

      saved[linkIndex] = link;
      localStorage.setItem('forgeLinks', JSON.stringify(saved));

      renderTrackingTable();
      showToast(`Status updated to: ${getStatusLabel(link.status)}`);
    }

    function deleteById(id) {
      if (!confirm('Delete this link?')) return;

      const saved = JSON.parse(localStorage.getItem('forgeLinks') || '[]');
      const filtered = saved.filter(l => l.id !== id);
      localStorage.setItem('forgeLinks', JSON.stringify(filtered));

      renderTrackingTable();
      showToast('Link deleted');
    }

    // ═══════════════════════════════════════════════════════════════
    // UTILITIES
    // ═══════════════════════════════════════════════════════════════

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // Load on page load
    renderTrackingTable();
  </script>
</body>
</html>
